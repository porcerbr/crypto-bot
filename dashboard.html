<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper Bot Dashboard</title>
    <style>
        body { background:#0b0f14; color:#c9d1d9; font-family: 'Segoe UI', sans-serif; padding:15px; margin:0; }
        .header { display:flex; justify-content:space-between; align-items:center; }
        .badge { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:bold; }
        .badge.live { background:#0e8c3a; color:#fff; }
        .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:15px; margin:15px 0; }
        .ticker { font-family: monospace; font-size: 14px; }
        .green { color:#3fb950; }
        .red { color:#f85149; }
        .btn { background:#21262d; border:1px solid #30363d; color:#c9d1d9; padding:8px 16px; border-radius:5px; cursor:pointer; margin:3px; }
        .btn.primary { background:#1f6feb; border-color:#1f6feb; color:#fff; }
        .btn.danger { background:#da3633; border-color:#da3633; color:#fff; }
        .flex { display:flex; gap:10px; align-items:center; }
        .metric { font-size:22px; font-weight:bold; }
        input { background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:8px 12px; border-radius:5px; width:80px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>⚡ Sniper Bot</h2>
        <div id="status-badge" class="badge live">OPERANDO</div>
    </div>

    <div class="card">
        <div class="flex">
            <div><small>Saldo</small><br><span class="metric" id="balance">0</span></div>
            <div><small>Win Rate</small><br><span class="metric" id="wr">0%</span></div>
            <div><small>Wins/Losses</small><br><span id="wl">0W / 0L</span></div>
            <div><small>Alav.</small><br><span id="leverage">200x</span></div>
        </div>
    </div>

    <h3>🎯 Sinais Pendentes</h3>
    <div id="pending-container">Nenhum sinal pendente.</div>

    <h3>📊 Trades Ativos</h3>
    <div id="active-container">Nenhum trade ativo.</div>

    <script>
        const API = '/api';
        async function fetchStatus() {
            const r = await fetch(API + '/status');
            const d = await r.json();
            document.getElementById('balance').innerText = '$' + d.balance.toFixed(2);
            document.getElementById('wr').innerText = d.winrate + '%';
            document.getElementById('wl').innerText = d.wins + 'W / ' + d.losses + 'L';
            document.getElementById('leverage').innerText = d.leverage + 'x';
            document.getElementById('status-badge').className = d.paused ? 'badge red' : 'badge live';
            document.getElementById('status-badge').innerText = d.paused ? 'PAUSADO' : 'OPERANDO';
        }
        async function fetchPending() {
            const r = await fetch(API + '/pending');
            const data = await r.json();
            const container = document.getElementById('pending-container');
            if (!data.length) { container.innerHTML = 'Nenhum sinal pendente.'; return; }
            container.innerHTML = data.map(p => `
                <div class="card">
                    <strong>${p.symbol} (${p.name})</strong> - ${p.dir}
                    <br>Entrada: ${p.entry.toFixed(5)} | SL: ${p.sl.toFixed(5)} | TP: ${p.tp.toFixed(5)}
                    <br>Confluência: ${p.score}/${p.max_score}  | RR: 1:${p.rr}
                    <br>Margem: <input type="number" id="amt-${p.pending_id}" placeholder="USD" value="100">
                    <button class="btn primary" onclick="execute(${p.pending_id})">✅ Executar</button>
                    <button class="btn danger" onclick="reject(${p.pending_id})">❌ Rejeitar</button>
                </div>
            `).join('');
        }
        async function execute(pid) {
            const amount = document.getElementById('amt-' + pid).value;
            await fetch(API + '/execute', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pending_id: pid, amount: parseFloat(amount) })
            });
            fetchPending();
            fetchStatus();
        }
        async function reject(pid) {
            await fetch(API + '/reject', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pending_id: pid })
            });
            fetchPending();
        }
        setInterval(() => { fetchStatus(); fetchPending(); }, 3000);
        fetchStatus(); fetchPending();
    </script>
</body>
</html>
