<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sniper Quantum - Tickmill</title>
<style>
:root {
  --bg: #06090f; --card: #0d1117; --hover: #161b22; --border: #21262d;
  --text: #c9d1d9; --dim: #8b949e; --green: #00e676; --red: #f85149;
  --orange: #f0883e; --blue: #58a6ff; --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; padding: 8px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 10px; margin-bottom: 8px; }
.card-header { font-weight: 700; font-size: 12px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.metric { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.btn {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; background: var(--hover); border: 1px solid var(--border);
  color: var(--text); padding: 12px 16px; border-radius: 8px;
  font-weight: 600; cursor: pointer; font-size: 14px; width: 100%;
  transition: background 0.2s; min-height: 48px;
}
.btn:active { background: var(--border); }
.btn.primary { background: var(--green); color: #0a0e14; border-color: var(--green); font-weight: 700; }
.btn.danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn.sm { width: auto; padding: 8px 14px; font-size: 12px; min-height: 40px; }
.btn-group { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.scroll { max-height: 250px; overflow-y: auto; }
.empty { text-align: center; color: var(--dim); font-size: 12px; padding: 20px; }
.tag { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 10px; color: var(--dim); font-weight: 600; }
.badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
.badge.live { border-color: var(--green); color: var(--green); }
.badge.pause { border-color: var(--red); color: var(--red); }
.toast-container { position: fixed; top: 10px; right: 10px; z-index: 999; }
.toast { background: var(--card); border-left: 3px solid var(--green); padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; font-size: 12px; }
.lot-line { font-size: 12px; color: var(--dim); margin-top: 4px; text-align: center; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span>SNIPER QUANTUM</span>
    <span id="status-badge" class="badge live">Operando</span>
  </div>
  <div class="metric"><span>Saldo</span><span id="balance">$0.00</span></div>
  <div class="metric"><span>Equity</span><span id="equity">$0.00</span></div>
  <div class="metric"><span>Margem usada</span><span id="used_margin">$0.00</span></div>
  <div class="metric"><span>Livre</span><span id="free_margin">$0.00</span></div>
  <div class="metric"><span>Nível</span><span id="margin_level">0%</span></div>
  <div class="metric"><span>Alavancagem</span><span id="leverage">500x</span></div>
  <div class="btn-group">
    <button class="btn sm" onclick="setMode('TUDO')">TUDO</button>
    <button class="btn sm" onclick="setMode('FOREX')">FX</button>
    <button class="btn sm" onclick="setMode('CRYPTO')">Crypto</button>
    <button class="btn sm" onclick="resetPause()">Reset CB</button>
  </div>
</div>

<div class="card">
  <div class="card-header">Inteligência de Mercado <span class="tag">IA</span></div>
  <div id="intel"><div class="empty">Carregando...</div></div>
</div>

<div class="card">
  <div class="card-header">Sinais Pendentes <span id="pend-count" class="tag">0</span></div>
  <div id="pending" class="scroll"><div class="empty">Nenhum sinal pendente.</div></div>
</div>

<div class="card">
  <div class="card-header">Trades Ativos <span id="active-count" class="tag">0</span></div>
  <div id="active-trades" class="scroll"><div class="empty">Nenhum trade ativo.</div></div>
</div>

<div id="toasts" class="toast-container"></div>

<script>
const API = window.location.origin;
let lastBalance = 500;

function toast(msg, isError = false) {
  const el = document.createElement('div');
  el.className = 'toast';
  if (isError) el.style.borderLeftColor = 'var(--red)';
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

async function api(url, opts) {
  const res = await fetch(API + url, opts);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function loadStatus() {
  try {
    const d = await api('/api/status');
    lastBalance = d.balance;
    document.getElementById('balance').textContent = '$' + d.balance.toFixed(2);
    document.getElementById('equity').textContent = '$' + d.equity.toFixed(2);
    document.getElementById('used_margin').textContent = '$' + d.used_margin.toFixed(2);
    document.getElementById('free_margin').textContent = '$' + d.free_margin.toFixed(2);
    document.getElementById('margin_level').textContent = d.margin_level.toFixed(1) + '%';
    document.getElementById('leverage').textContent = d.leverage + 'x';
    const badge = document.getElementById('status-badge');
    if (d.paused) { badge.className = 'badge pause'; badge.textContent = 'Pausado'; }
    else { badge.className = 'badge live'; badge.textContent = 'Operando'; }

    // Trades ativos
    const activeDiv = document.getElementById('active-trades');
    document.getElementById('active-count').textContent = d.active_trades.length;
    if (!d.active_trades.length) {
      activeDiv.innerHTML = '<div class="empty">Nenhum trade ativo.</div>';
    } else {
      activeDiv.innerHTML = d.active_trades.map(t => {
        const pnlClass = t.pnl >= 0 ? 'color:var(--green)' : 'color:var(--red)';
        const pnlStr = t.pnl >= 0 ? `+${t.pnl.toFixed(2)}%` : `${t.pnl.toFixed(2)}%`;
        return `<div style="margin:8px 0;border-bottom:1px solid var(--border);padding:6px 0">
          <div><b>${t.symbol}</b> ${t.dir} | Entrada: ${t.entry}</div>
          <div>Atual: ${t.current} | <span style="${pnlClass}">P&L: ${pnlStr} ($${t.pnl_money.toFixed(2)})</span></div>
          <div>Lote: ${t.lot} | Margem: $${t.margin_required.toFixed(2)}</div>
          <div style="display:flex;gap:8px;margin-top:4px"><span style="color:var(--red)">SL: ${t.sl} (${t.sl_pct}%)</span> <span style="color:var(--green)">TP: ${t.tp} (${t.tp_pct}%)</span></div>
          <div style="font-size:12px">Progresso TP: ${t.progress}%</div>
        </div>`;
      }).join('');
    }

    document.getElementById('pend-count').textContent = d.pending_count;
    if (d.pending_count > 0) loadPending();
  } catch(e) { console.error(e); }
}

async function loadPending() {
  try {
    const pending = await api('/api/pending');
    const div = document.getElementById('pending');
    if (!pending.length) { div.innerHTML = '<div class="empty">Nenhum sinal pendente.</div>'; return; }
    div.innerHTML = pending.map(p => {
      const info = p.capital_2pct_info || {};
      const amount = info.amount_usd || (lastBalance * 0.02).toFixed(2);
      const lot = info.lot || 0.01;
      const pct = info.pct || 2;
      return `<div style="margin:8px 0;border-left:3px solid var(--green);padding-left:8px">
        <div><b>${p.symbol}</b> ${p.dir}</div>
        <div style="font-size:12px;color:var(--dim)">Entrada: ${p.entry} | SL: ${p.sl} (${p.sl_pct}%) | TP: ${p.tp} (${p.tp_pct}%)</div>
        <div style="font-size:11px">Conf: ${p.sc}/${p.tot_c} | RR: ${p.rr_label} | Premium: ${p.premium_score}</div>
        <div class="lot-line">
          💰 ${pct}% do capital = <b>$${amount}</b> → <b>${lot} lotes</b>
        </div>
        <button class="btn primary" onclick="executeTwoPercent(${p.pending_id}, ${amount})">
          ENTRAR COM ${pct}%
        </button>
        <button class="btn danger sm" onclick="reject(${p.pending_id})" style="margin-top:6px">Rejeitar sinal</button>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

async function executeTwoPercent(pid, amount) {
  try {
    await api('/api/execute_pending', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pending_id: pid, amount}) });
    toast(`✅ Trade aberto! Margem: $${amount}`);
    loadStatus();
  } catch(e) { toast('Erro ao executar trade', true); }
}

async function reject(pid) {
  try {
    await api('/api/reject', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pending_id: pid}) });
    toast('Sinal rejeitado');
    loadStatus();
  } catch(e) { toast('Erro ao rejeitar', true); }
}

async function loadIntel() {
  try {
    const d = await api('/api/intel');
    let html = '';
    const score = d.sentiment_score || 0;
    const color = score > 0.2 ? 'var(--green)' : score < -0.2 ? 'var(--red)' : 'var(--dim)';
    html += `<div style="font-weight:600;color:${color}">Sentimento IA: ${score.toFixed(2)}</div>`;
    if (d.sentiment_reasons && d.sentiment_reasons.length) {
      html += d.sentiment_reasons.map(r => `<div style="font-size:11px">${r[1]>0 ? '↑' : '↓'} ${r[0]}</div>`).join('');
    }
    html += '<div style="margin-top:6px"><b>Baleias:</b></div>';
    if (!d.whales || !d.whales.length) html += '<div style="font-size:12px;color:var(--dim)">Nenhum alerta.</div>';
    else d.whales.forEach(w => {
      html += `<div style="font-size:11px">${w.symbol} $${(w.amount_usd/1e6).toFixed(2)}M ${w.from_owner} → ${w.to_owner}</div>`;
    });
    document.getElementById('intel').innerHTML = html;
  } catch(e) { console.error(e); }
}

async function setMode(m) { await api('/api/mode', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mode:m})}); }
async function resetPause() { await api('/api/resetpausa', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'}); loadStatus(); }

setInterval(loadStatus, 5000);
setInterval(loadIntel, 60000);
loadStatus();
loadIntel();
</script>
</body>
</html>
